<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>멀티버스</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#eee;height:100vh;overflow:hidden;}
#app{display:flex;height:100vh;}
/* sidebar */
#sidebar{width:200px;min-width:200px;background:#16213e;border-right:1px solid #0f3460;display:flex;flex-direction:column;padding:12px;gap:6px;overflow:hidden;}
#sidebar h3{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em;padding:4px 0 2px;}
#chat-log{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;min-height:0;}
#chat-log::-webkit-scrollbar{width:3px;}
#chat-log::-webkit-scrollbar-thumb{background:#0f3460;border-radius:2px;}
.chat-msg{font-size:11px;line-height:1.4;padding:3px 6px;border-radius:5px;background:#0d1b2a;color:#ccc;word-break:break-all;}
.chat-msg b{margin-right:4px;}
#user-list{display:flex;flex-direction:column;gap:4px;}
.user-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:8px;}
.u-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.u-info{flex:1;overflow:hidden;}
.u-name{font-size:12px;font-weight:500;color:#eee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;padding:1px 3px;border-radius:3px;}
.u-name:hover{background:#0f3460;}
.u-loc{font-size:10px;color:#666;}
.u-dot2{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0;}
.home-badge{font-size:9px;background:#2a1a4a;color:#aa88ff;border-radius:3px;padding:1px 5px;display:inline-block;margin-top:1px;}
/* canvas */
#cw{flex:1;position:relative;overflow:hidden;}
canvas{display:block;cursor:crosshair;}
#fade{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .35s;}
/* status */
#statusbar{position:absolute;top:10px;right:12px;font-size:11px;color:#aaa;background:#16213e;padding:4px 10px;border-radius:99px;border:1px solid #0f3460;}
/* chat bar */
#chatbar{position:absolute;bottom:12px;left:12px;right:12px;display:flex;gap:6px;}
#chatinput{flex:1;padding:7px 11px;border-radius:8px;border:1px solid #0f3460;background:#16213e;color:#eee;font-size:13px;font-family:inherit;}
#chatinput:focus{outline:none;border-color:#7F77DD;}
#chatsend{padding:7px 14px;border-radius:8px;border:none;background:#7F77DD;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;}
/* face picker */
#facepick{position:absolute;display:none;background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:8px;gap:6px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5);}
#facepick button{font-size:20px;background:none;border:none;cursor:pointer;border-radius:6px;padding:3px 5px;}
#facepick button:hover{background:#0f3460;}
/* private banner */
#privbanner{position:absolute;top:10px;left:12px;display:none;align-items:center;gap:8px;background:rgba(20,10,40,.85);border:1px solid #aa88ff44;border-radius:99px;padding:5px 12px;}
#privbanner span{font-size:11px;color:#cc99ff;}
/* action btn */
#actbtn{position:absolute;display:none;padding:7px 14px;border-radius:99px;border:none;font-size:12px;font-weight:600;cursor:pointer;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.4);}
/* scene nav overlay */
#scenenav{position:absolute;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:300;}
#scenenavbox{background:#16213e;border:1px solid #0f3460;border-radius:20px;padding:28px 32px;min-width:260px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.6);}
#scenenavbox h3{font-size:13px;color:#888;margin-bottom:20px;text-transform:uppercase;letter-spacing:.08em;}
.snitem{display:flex;align-items:center;gap:10px;width:100%;padding:13px 18px;border-radius:12px;border:1px solid #0f3460;background:#0d1b2a;color:#ccc;font-size:15px;cursor:pointer;font-family:inherit;margin-bottom:10px;transition:all .15s;text-align:left;}
.snitem:last-of-type{margin-bottom:0;}
.snitem:hover,.snitem.snfocus{background:#1a3060;border-color:#7F77DD;color:#fff;}
.snitem.sncurrent{opacity:.35;cursor:default;}
#scenenavhint{font-size:11px;color:#555;margin-top:14px;}
/* menu overlay */
#menuoverlay{position:absolute;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;}
#menubox{background:#1e1208;border:1px solid #6B4020;border-radius:16px;padding:24px;width:340px;max-width:90%;position:relative;}
#menubox h2{font-size:16px;font-weight:700;color:#f5d08a;margin-bottom:16px;text-align:center;}
.menu-drinks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.mdrink{padding:8px 10px;border-radius:8px;border:1px solid #6B4020;background:#2a1808;color:#e8c890;font-size:13px;cursor:pointer;text-align:center;transition:all .15s;}
.mdrink:hover,.mdrink.msel,.mdrink.mfocus{background:#7B5030;border-color:#c88040;color:#fff;}
.menu-temp{display:flex;gap:8px;margin-bottom:16px;}
.mtemp{flex:1;padding:8px;border-radius:8px;border:1px solid #6B4020;background:#2a1808;color:#e8c890;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;}
.mtemp.msel,.mtemp.mfocus{background:#3a5080;border-color:#6090c0;color:#fff;}
#menuorder{width:100%;padding:10px;border-radius:8px;background:#7F77DD;border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
#menuorder:disabled{background:#444;cursor:default;}
#menuorder.mfocus{outline:2px solid #ffd070;}
#menuclosenote{font-size:10px;color:#555;text-align:center;margin-top:8px;}
/* hat overlay */
#hatoverlay{position:absolute;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;}
#hatbox{background:#1e2a1e;border:1px solid #3a5a3a;border-radius:16px;padding:24px;width:380px;max-width:90%;position:relative;}
#hatbox h2{font-size:16px;font-weight:700;color:#a0e0a0;margin-bottom:16px;text-align:center;}
.hatgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.hatitem{padding:10px 6px;border-radius:10px;border:1px solid #3a5a3a;background:#162016;color:#c0e0c0;font-size:11px;cursor:pointer;text-align:center;transition:all .15s;}
.hatitem:hover,.hatitem.hsel,.hatitem.hfocus{background:#2a4a2a;border-color:#6a9a6a;color:#fff;}
.haticon{font-size:22px;display:block;margin-bottom:3px;}
/* color popup */
#colorpopup{position:absolute;background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:14px;z-index:500;display:none;box-shadow:0 4px 20px rgba(0,0,0,.6);min-width:190px;}
#colorpopup h4{font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}
#nameedit{width:100%;padding:6px 8px;border-radius:6px;border:1px solid #0f3460;background:#0d1b2a;color:#eee;font-size:13px;font-family:inherit;margin-bottom:10px;}
#nameedit:focus{outline:none;border-color:#7F77DD;}
.swatches{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
.sw:hover{transform:scale(1.2);}
.sw.swactive{border-color:#fff;transform:scale(1.15);}
#colorconfirm{width:100%;padding:6px;border-radius:6px;border:none;background:#7F77DD;color:#fff;font-size:12px;cursor:pointer;font-family:inherit;}
/* login */
#loginscreen{position:fixed;inset:0;background:linear-gradient(135deg,#0d1b2a,#1a1a3e);display:flex;align-items:center;justify-content:center;z-index:9999;}
#loginbox{background:#16213e;border:1px solid #0f3460;border-radius:20px;padding:40px 36px;width:340px;text-align:center;}
#loginbox .logo{font-size:48px;margin-bottom:12px;}
#loginbox h1{font-size:22px;font-weight:700;color:#eee;margin-bottom:6px;}
#loginbox p{font-size:13px;color:#888;margin-bottom:28px;}
#logininput{width:100%;padding:12px 16px;border-radius:10px;border:1px solid #0f3460;background:#0d1b2a;color:#eee;font-size:15px;font-family:inherit;text-align:center;margin-bottom:14px;}
#logininput:focus{outline:none;border-color:#7F77DD;}
#loginbtn{width:100%;padding:12px;border-radius:10px;border:none;background:#7F77DD;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
#loginbtn:disabled{background:#444;cursor:default;}
/* cheers btn */
#cheersbtn{position:absolute;display:none;padding:8px 16px;border-radius:99px;border:2px solid #f0c030;background:#3a2800;color:#f0c030;font-size:13px;font-weight:600;cursor:pointer;z-index:50;}
</style>
</head>
<body>
<div id="loginscreen">
  <div id="loginbox">
    <div class="logo">🌐</div>
    <h1>멀티버스</h1>
    <p>닉네임을 입력하고 입장하세요</p>
    <input id="logininput" placeholder="닉네임 (최대 10자)" maxlength="10"/>
    <button id="loginbtn" disabled>입장하기</button>
  </div>
</div>
<div id="app">
  <div id="sidebar">
    <h3>접속 중</h3>
    <div id="user-list"></div>
    <div style="font-size:10px;color:#444;padding:4px 2px;border-top:1px solid #0f3460;margin-top:4px;">💬 채팅</div>
    <div id="chat-log"></div>
    <div style="padding-top:6px;border-top:1px solid #0f3460;font-size:10px;color:#444;">이름 클릭 → 프로필 수정</div>
  </div>
  <div id="cw">
    <canvas id="c"></canvas>
    <div id="fade"></div>
    <div id="privbanner"><span>🔒 개인 공간</span></div>
    <div id="statusbar">🏢 회사 사무실</div>
    <div id="facepick">
      <button data-face="happy">😊</button><button data-face="sad">😢</button>
      <button data-face="angry">😠</button><button data-face="squint">😒</button>
      <button data-face="tongue">😛</button><button data-face="lol">😂</button>
    </div>
    <button id="actbtn"></button>
    <button id="cheersbtn">🥂 건배! (Ctrl)</button>
    <!-- scene nav -->
    <div id="scenenav">
      <div id="scenenavbox">
        <h3>🚪 어디로 갈까요?</h3>
        <button class="snitem" data-scene="office">🏢 회사 사무실</button>
        <button class="snitem" data-scene="cafe">☕ 카페</button>
        <button class="snitem" data-scene="home">🏠 내 집</button>
        <div id="scenenavhint">↑↓ 방향키 · Enter 선택 · Esc 닫기</div>
      </div>
    </div>
    <!-- menu -->
    <div id="menuoverlay">
      <div id="menubox">
        <h2>☕ 메뉴판</h2>
        <div class="menu-drinks" id="menudrinks">
          <div class="mdrink" data-drink="아메리카노">아메리카노</div>
          <div class="mdrink" data-drink="카페라떼">카페라떼</div>
          <div class="mdrink" data-drink="돌체라떼">돌체라떼</div>
          <div class="mdrink" data-drink="페퍼민트">페퍼민트</div>
          <div class="mdrink" data-drink="초코라떼">초코라떼</div>
          <div class="mdrink" data-drink="딸기라떼">딸기라떼</div>
          <div class="mdrink" data-drink="케이크">🎂 케이크</div>
        </div>
        <div class="menu-temp" id="menutemp">
          <button class="mtemp" data-temp="HOT">🔥 HOT</button>
          <button class="mtemp" data-temp="ICE">🧊 ICE</button>
        </div>
        <div id="cakenote" style="font-size:11px;color:#888;text-align:center;margin-bottom:8px;display:none;">케이크는 온도 선택 없이 주문!</div>
        <button id="menuorder" disabled>주문하기</button>
        <div id="menuclosenote">↑↓←→ 이동 · Enter 선택 · Esc 닫기</div>
      </div>
    </div>
    <!-- hat overlay -->
    <div id="hatoverlay">
      <div id="hatbox">
        <h2>🪞 옷장 — 스타일</h2>
        <div class="hatgrid" id="hatgrid">
          <div class="hatitem" data-hat="none"><span class="haticon">🚫</span>없음</div>
          <div class="hatitem" data-hat="cowboy"><span class="haticon">🤠</span>카우보이</div>
          <div class="hatitem" data-hat="noble"><span class="haticon">🎩</span>귀족</div>
          <div class="hatitem" data-hat="gat"><span class="haticon">🪖</span>갓</div>
          <div class="hatitem" data-hat="ribbon"><span class="haticon">🎀</span>리본</div>
          <div class="hatitem" data-hat="flower"><span class="haticon">🌸</span>꽃</div>
          <div class="hatitem" data-hat="sunglass"><span class="haticon">🕶️</span>선글라스</div>
        </div>
        <button id="hatclose" style="position:absolute;top:12px;right:14px;background:none;border:none;color:#888;font-size:18px;cursor:pointer;">✕</button>
        <div style="font-size:10px;color:#555;text-align:center;margin-top:4px;">↑↓←→ 이동 · Enter 선택 · Esc 닫기</div>
      </div>
    </div>
    <!-- chat bar -->
    <div id="chatbar">
      <input id="chatinput" placeholder="채팅 입력... (Enter)" autocomplete="off"/>
      <button id="chatsend">전송</button>
    </div>
    <!-- color popup -->
    <div id="colorpopup">
      <h4>✏️ 프로필 수정</h4>
      <input id="nameedit" placeholder="닉네임" maxlength="10"/>
      <h4>🎨 색상</h4>
      <div class="swatches" id="swatches"></div>
      <button id="colorconfirm">확인</button>
    </div>
  </div>
</div>
<script>
// ── constants ──
const COLORS=['#7F77DD','#1D9E75','#D85A30','#D4537E','#378ADD','#BA7517','#E040A0','#20B8C8','#8B5CF6','#EF4444','#10B981','#F59E0B','#6366F1','#EC4899','#14B8A6','#F97316'];
const DRINKS=['아메리카노','카페라떼','돌체라떼','페퍼민트','초코라떼','딸기라떼','케이크'];
const TEMPS=['HOT','ICE'];
const HATS=['none','cowboy','noble','gat','ribbon','flower','sunglass'];

// ── state ──
const me={
  id:'me', name:'나', color:COLORS[0], scene:'office',
  px:0, py:0, tx:0, ty:0,
  dir:'down', moving:false,
  face:'happy', baseFace:'happy',
  hat:null, sitting:false, chairDir:'down',
  holdingDrink:null,
  drinkingAnim:0, eatingAnim:0, toastAnim:0,
  bubble:null, afk:false, lastActive:Date.now(),
  loggedIn:false,
};
const others=[]; // future: real multiplayer users

let scene='office', transitioning=false, pendingScene=null;

// ── scene nav state ──
let sceneNavOpen=false, sceneNavIdx=0;

// ── menu state ──
let menuOpen=false, menuCursor=0, selDrink=null, selTemp=null;
// menu cursor map: 0-6 drinks, 7=HOT, 8=ICE, 9=order

// ── hat state ──
let hatOpen=false, hatCursor=0;

// ── keys ──
const keys={};

// ── canvas ──
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const cw=document.getElementById('cw');

// ── iso projection ──
function ip(gx,gy,gz){
  const cx=canvas.width/2, cy=canvas.height/2-50, T=46;
  return{sx:cx+(gx-gy)*T, sy:cy+(gx+gy)*T*.5-gz*28};
}
function screenToGrid(sx,sy){
  const cx=canvas.width/2, cy=canvas.height/2-50, T=46;
  const rx=(sx-cx)/T, ry=(sy-cy)/T*2;
  return{gx:(rx+ry)/2, gy:(ry-rx)/2};
}
function clampToRoom(nx,ny){
  const g=screenToGrid(nx,ny);
  const cgx=Math.max(-3.8,Math.min(3.8,g.gx));
  const cgy=Math.max(-2.8,Math.min(2.8,g.gy));
  const p=ip(cgx,cgy,0);
  return{x:p.sx,y:p.sy};
}

// ── scene geometry ──
const SCENES={
  office:{label:'🏢 회사 사무실', doorGx:3.0, doorGy:2.4},
  cafe:  {label:'☕ 카페',        doorGx:3.0, doorGy:2.4},
  home:  {label:'🏠 내 집',       doorGx:3.0, doorGy:2.4},
};
const SPAWN={office:{gx:0,gy:1.5}, cafe:{gx:0,gy:0.8}, home:{gx:0.5,gy:1.0}};

const OFFICE_DESKS=[
  {gx:-2.8,gy:-1.6},{gx:-1.4,gy:-1.6},{gx:0.0,gy:-1.6},{gx:1.4,gy:-1.6},
  {gx:-2.8,gy:-0.2},{gx:-1.4,gy:-0.2},{gx:0.0,gy:-0.2},{gx:1.4,gy:-0.2},
];
const CAFE_CHAIRS=[
  {gx:-1.55,gy:-1.5},{gx:0.05,gy:-1.5},
  {gx:-1.55,gy:1.1},{gx:0.05,gy:1.1},
];
const SOFA={gx:-2.8,gy:0.2};
const WARDROBE={gx:1.6,gy:-1.9};
const STAFF_POS={gx:2.1,gy:-1.55};
const COUNTER={gx:1.8,gy:-1.7};

function deskChairPos(d){return{gx:d.gx+0.15,gy:d.gy+0.65};}

function initMe(){
  const s=SPAWN[me.scene]||{gx:0,gy:0};
  const p=ip(s.gx,s.gy,0);
  me.px=p.sx; me.py=p.sy; me.tx=p.sx; me.ty=p.sy;
  me.moving=false; me.dir='down'; me.sitting=false; me.chairDir='down';
}

// ── distances ──
function distToDoor(){
  const d=SCENES[scene];
  const p=ip(d.doorGx,d.doorGy,0);
  return Math.hypot(me.px-p.sx,me.py-p.sy);
}
function distToSofa(){
  const p=ip(SOFA.gx+0.7,SOFA.gy+0.5,0);
  return Math.hypot(me.px-p.sx,me.py-p.sy);
}
function distToWardrobe(){
  const p=ip(WARDROBE.gx+0.5,WARDROBE.gy+0.25,0);
  return Math.hypot(me.px-p.sx,me.py-p.sy);
}
function distToCounter(){
  const p=ip(COUNTER.gx+0.6,COUNTER.gy+0.25,0);
  return Math.hypot(me.px-p.sx,me.py-p.sy);
}
function nearestOfficeChair(){
  let best=null,bd=9999;
  OFFICE_DESKS.forEach((d,i)=>{
    const c=deskChairPos(d);
    const p=ip(c.gx+0.25,c.gy+0.25,0);
    const dist=Math.hypot(me.px-p.sx,me.py-p.sy);
    if(dist<bd){bd=dist;best={...c,idx:i,dist,px:p.sx,py:p.sy};}
  });
  return best;
}
function nearestCafeChair(){
  let best=null,bd=9999;
  CAFE_CHAIRS.forEach((c,i)=>{
    const p=ip(c.gx+0.25,c.gy+0.25,0);
    const dist=Math.hypot(me.px-p.sx,me.py-p.sy);
    if(dist<bd){bd=dist;best={...c,idx:i,dist,px:p.sx,py:p.sy};}
  });
  return best;
}

// ── cafe state ──
const cafe={
  staffDir:'down', staffBubble:null,
  orderStatus:null, orderDrink:null, orderTemp:null,
  drinkOnCounter:false,
};

// ── drawing helpers ──
function tile(gx,gy,c1,c2){
  const pts=[ip(gx,gy,0),ip(gx+1,gy,0),ip(gx+1,gy+1,0),ip(gx,gy+1,0)];
  ctx.beginPath();ctx.moveTo(pts[0].sx,pts[0].sy);
  for(let i=1;i<4;i++)ctx.lineTo(pts[i].sx,pts[i].sy);
  ctx.closePath();ctx.fillStyle=(gx+gy)%2===0?c1:c2;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=.5;ctx.stroke();
}
function box(gx,gy,gz,gw,gd,gh,ct,cl,cr){
  const C=[ip(gx,gy,gz),ip(gx+gw,gy,gz),ip(gx+gw,gy+gd,gz),ip(gx,gy+gd,gz),
           ip(gx,gy,gz+gh),ip(gx+gw,gy,gz+gh),ip(gx+gw,gy+gd,gz+gh),ip(gx,gy+gd,gz+gh)];
  const face=(idx,col)=>{
    ctx.beginPath();ctx.moveTo(C[idx[0]].sx,C[idx[0]].sy);
    for(let i=1;i<idx.length;i++)ctx.lineTo(C[idx[i]].sx,C[idx[i]].sy);
    ctx.closePath();ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=.5;ctx.stroke();
  };
  face([4,5,6,7],ct);face([0,4,7,3],cl);face([1,5,6,2],cr);
}
function desk(gx,gy){

function painting(gx,gy,gz,gw,gh,fc,bg,shapes){

  ctx.closePath();ctx.clip();
  ctx.fillStyle=bg;ctx.fillRect(0,0,canvas.width,canvas.height);

}

// ── avatar drawing ──
function drawAvatar(u){
  const hx=u.px, hy=u.py;
  const R=13, footY=hy+30, waistY=hy+14, neckY=hy+2;
  const dir=u.dir||'down';
  const walkT=Date.now()*.012;
  const isWalking=u.moving||(u.id==='me'&&(keys['ArrowUp']||keys['ArrowDown']||keys['ArrowLeft']||keys['ArrowRight']||keys['w']||keys['s']||keys['a']||keys['d']));
  const legSwing=isWalking?Math.sin(walkT)*10:0;
  const legSwing2=isWalking?Math.sin(walkT+Math.PI)*10:0;

  // sitting pose
  if(u.sitting){
    const sx=hx,sy=hy;
    const isWork=(u.chairDir==='up');
    ctx.save();ctx.translate(sx,sy);
    // shadow
    ctx.beginPath();ctx.ellipse(0,16,14,5,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.2)';ctx.fill();
    if(isWork){
      // working pose - side profile facing monitor
      ctx.lineWidth=5;ctx.lineCap='round';ctx.strokeStyle=u.color;
      ctx.beginPath();ctx.moveTo(-4,-4);ctx.lineTo(-10,4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-10,4);ctx.lineTo(-8,14);ctx.stroke();
      ctx.beginPath();ctx.moveTo(4,-4);ctx.lineTo(10,4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(10,4);ctx.lineTo(8,14);ctx.stroke();
      ctx.fillStyle=u.color;
      ctx.beginPath();ctx.ellipse(-8,15,5,3,-.1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(8,15,5,3,.1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo(-8,-6);ctx.lineTo(-4,-20);ctx.lineTo(4,-22);ctx.lineTo(8,-8);ctx.closePath();ctx.fillStyle=u.color;ctx.fill();
      ctx.lineWidth=4.5;ctx.strokeStyle=u.color;
      ctx.beginPath();ctx.moveTo(-3,-18);ctx.quadraticCurveTo(4,-26,12,-22);ctx.stroke();
      ctx.beginPath();ctx.moveTo(4,-21);ctx.quadraticCurveTo(10,-28,16,-24);ctx.stroke();
      ctx.fillStyle=u.color;
      ctx.beginPath();ctx.ellipse(13,-22,4,3,-.4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(17,-24,4,3,-.3,0,Math.PI*2);ctx.fill();
      ctx.lineWidth=5;ctx.strokeStyle=u.color;
      ctx.beginPath();ctx.moveTo(2,-21);ctx.lineTo(4,-21-R*.6);ctx.stroke();
      ctx.beginPath();ctx.arc(5,-21-R,R,0,Math.PI*2);ctx.fillStyle=u.color;ctx.fill();
      if(u.id==='me'){ctx.strokeStyle='white';ctx.lineWidth=2.5;ctx.stroke();}
      ctx.fillStyle='rgba(255,255,255,.95)';ctx.beginPath();ctx.arc(10,-21-R-2,2.5,0,Math.PI*2);ctx.fill();

      drawHat(5,-21-R,u.hat,R);
    } else {
      let rotAngle=0;
      if(u.chairDir==='left') rotAngle=-Math.PI/6;
      else if(u.chairDir==='right') rotAngle=Math.PI/6;
      ctx.rotate(rotAngle);
      ctx.beginPath();ctx.moveTo(-9,-8);ctx.lineTo(-5,-22);ctx.lineTo(5,-22);ctx.lineTo(9,-8);ctx.closePath();ctx.fillStyle=u.color;ctx.fill();
      ctx.lineWidth=5;ctx.lineCap='round';ctx.strokeStyle=u.color;
      ctx.beginPath();ctx.moveTo(-5,-8);ctx.lineTo(-8,14);ctx.stroke();
      ctx.beginPath();ctx.moveTo(5,-8);ctx.lineTo(8,14);ctx.stroke();
      ctx.fillStyle=u.color;
      ctx.beginPath();ctx.ellipse(-8,15,6,3,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(8,15,6,3,0,0,Math.PI*2);ctx.fill();
      ctx.lineWidth=4.5;ctx.strokeStyle=u.color;
      ctx.beginPath();ctx.moveTo(-5,-20);ctx.quadraticCurveTo(-16,-10,-12,0);ctx.stroke();
      ctx.beginPath();ctx.moveTo(5,-20);ctx.quadraticCurveTo(16,-10,12,0);ctx.stroke();
      ctx.lineWidth=5;ctx.strokeStyle=u.color;
      ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(0,-22-R*.5);ctx.stroke();
      ctx.beginPath();ctx.arc(0,-22-R,R,0,Math.PI*2);ctx.fillStyle=u.color;ctx.fill();
      if(u.id==='me'){ctx.strokeStyle='white';ctx.lineWidth=2.5;ctx.stroke();}
      drawFace(0,-22-R,u.face||'relax');
      drawHat(0,-22-R,u.hat,R);
      if(u.holdingDrink) drawCup(16,-14,u.holdingDrink.drink,u.holdingDrink.temp,.65);
    }
    ctx.restore();
    // nametag (not rotated)
    drawNametag(sx,sy-22-R-36,u);
    storeBubblePos(u,sx,sy-22-R-52);
    return;
  }

  // shadow
  ctx.beginPath();ctx.ellipse(hx,footY+3,12,5,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.25)';ctx.fill();

  if(dir==='up'){
    // back view
    ctx.lineWidth=5;ctx.lineCap='round';ctx.strokeStyle=u.color;
    ctx.beginPath();ctx.moveTo(hx-4,waistY);ctx.lineTo(hx-5+legSwing,footY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(hx+4,waistY);ctx.lineTo(hx+5+legSwing2,footY);ctx.stroke();
    ctx.fillStyle=u.color;
    ctx.beginPath();ctx.ellipse(hx-5+legSwing,footY+1,5,3,-.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(hx+5+legSwing2,footY+1,5,3,.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(hx-10,waistY);ctx.lineTo(hx-6,neckY);ctx.lineTo(hx+6,neckY);ctx.lineTo(hx+10,waistY);ctx.closePath();ctx.fillStyle=u.color;ctx.fill();
    const sw=isWalking?Math.sin(walkT)*8:0;
    ctx.lineWidth=4.5;ctx.strokeStyle=u.color;
    ctx.beginPath();ctx.moveTo(hx-5,neckY+4);ctx.quadraticCurveTo(hx-18,neckY+6+sw,hx-13,waistY+2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(hx+5,neckY+4);ctx.quadraticCurveTo(hx+18,neckY+6-sw,hx+13,waistY+2);ctx.stroke();
    ctx.lineWidth=5;ctx.strokeStyle=u.color;
    ctx.beginPath();ctx.moveTo(hx,neckY);ctx.lineTo(hx,hy+R*.5);ctx.stroke();
    ctx.beginPath();ctx.arc(hx,hy,R,0,Math.PI*2);ctx.fillStyle=u.color;ctx.fill();
    if(u.id==='me'){ctx.strokeStyle='white';ctx.lineWidth=2.5;ctx.stroke();}
    ctx.font='bold 7px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.45)';ctx.fillText('뒤',hx,hy+3);
    drawHat(hx,hy,u.hat,R);
  } else if(dir==='left'||dir==='right'){
    const flip=dir==='right', sx2=flip?1:-1;
    const sLegF=isWalking?Math.sin(walkT)*12:0;
    const sLegB=isWalking?Math.sin(walkT+Math.PI)*12:0;
    ctx.save();ctx.translate(hx,0);ctx.scale(sx2,1);
    ctx.lineWidth=5;ctx.lineCap='round';ctx.strokeStyle=u.color;
    ctx.beginPath();ctx.moveTo(2,waistY);ctx.lineTo(2+sLegF,footY);ctx.stroke();
    ctx.globalAlpha=.7;
    ctx.beginPath();ctx.moveTo(-2,waistY);ctx.lineTo(-2+sLegB,footY);ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle=u.color;
    ctx.beginPath();ctx.ellipse(2+sLegF,footY+1,6,3,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=.7;
    ctx.beginPath();ctx.ellipse(-2+sLegB,footY+1,5,3,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.beginPath();ctx.moveTo(-8,waistY);ctx.lineTo(-4,neckY);ctx.lineTo(4,neckY);ctx.lineTo(8,waistY);ctx.closePath();ctx.fillStyle=u.color;ctx.fill();
    const armSwing=isWalking?Math.sin(walkT)*12:0;
    ctx.lineWidth=4.5;ctx.strokeStyle=u.color;
    ctx.beginPath();ctx.moveTo(-3,neckY+4);ctx.quadraticCurveTo(-3,neckY+12+armSwing,-3,waistY+2);ctx.stroke();
    ctx.lineWidth=5;ctx.strokeStyle=u.color;
    ctx.beginPath();ctx.moveTo(0,neckY);ctx.lineTo(0,hy+R*.5);ctx.stroke();
    ctx.beginPath();ctx.arc(0,hy,R,0,Math.PI*2);ctx.fillStyle=u.color;ctx.fill();
    if(u.id==='me'){ctx.strokeStyle='white';ctx.lineWidth=2.5;ctx.stroke();}
    ctx.fillStyle='rgba(255,255,255,.95)';ctx.beginPath();ctx.arc(4,hy-3,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(30,15,5,.85)';ctx.beginPath();ctx.arc(4,hy-3,1.1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(4,hy+2,4,.2,Math.PI-.2);ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.restore();
    drawHat(hx,hy,u.hat,R);
    if(u.holdingDrink) drawCup(flip?hx+16:hx-16,neckY+6,u.holdingDrink.drink,u.holdingDrink.temp,.7);
  } else {
    // front
    ctx.lineWidth=5;ctx.lineCap='round';ctx.strokeStyle=u.color;
    ctx.beginPath();ctx.moveTo(hx-4,waistY);ctx.lineTo(hx-5+legSwing,footY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(hx+4,waistY);ctx.lineTo(hx+5+legSwing2,footY);ctx.stroke();
    ctx.fillStyle=u.color;
    ctx.beginPath();ctx.ellipse(hx-5+legSwing,footY+1,5,3,-.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(hx+5+legSwing2,footY+1,5,3,.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(hx-10,waistY);ctx.lineTo(hx-6,neckY);ctx.lineTo(hx+6,neckY);ctx.lineTo(hx+10,waistY);ctx.closePath();ctx.fillStyle=u.color;ctx.fill();
    const sw=isWalking?Math.sin(walkT)*8:0;
    ctx.lineWidth=4.5;ctx.strokeStyle=u.color;
    ctx.beginPath();ctx.moveTo(hx-5,neckY+4);ctx.quadraticCurveTo(hx-18,neckY+6+sw,hx-13,waistY+2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(hx+5,neckY+4);ctx.quadraticCurveTo(hx+18,neckY+6-sw,hx+13,waistY+2);ctx.stroke();
    ctx.lineWidth=5;ctx.strokeStyle=u.color;
    ctx.beginPath();ctx.moveTo(hx,neckY);ctx.lineTo(hx,hy+R*.5);ctx.stroke();
    ctx.beginPath();ctx.arc(hx,hy,R,0,Math.PI*2);ctx.fillStyle=u.color;ctx.fill();
    if(u.id==='me'){ctx.strokeStyle='white';ctx.lineWidth=2.5;ctx.stroke();}
    // toast face
    if(u.toastAnim>0){
      const fdir=1;
      ctx.beginPath();ctx.arc(hx,hy,R+1,0,Math.PI*2);ctx.fillStyle=u.color;ctx.fill();
      const ma=.25*Math.PI*Math.abs(Math.sin(u.toastAnim*.15));
      ctx.beginPath();ctx.moveTo(hx,hy);ctx.arc(hx,hy,R,ma,-ma,false);ctx.closePath();ctx.fillStyle=u.color;ctx.fill();
      if(u.id==='me'){ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();}
      ctx.fillStyle='rgba(30,15,5,.85)';ctx.beginPath();ctx.arc(hx+3,hy-R*.4,2,0,Math.PI*2);ctx.fill();
      if(u.toastAnim>35&&u.toastAnim<50){ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText('🥂',hx,hy-R-20);}
    } else {
      drawFace(hx,hy,u.face||'happy');
    }
    drawHat(hx,hy,u.hat,R);
    // drink
    if(u.holdingDrink){
      if(u.holdingDrink.drink==='케이크'&&u.eatingAnim>0){
        // eating pacman
        ctx.beginPath();ctx.arc(hx,hy,R+2,0,Math.PI*2);ctx.fillStyle=u.color;ctx.fill();
        const ma2=.25*Math.PI*Math.abs(Math.sin(u.eatingAnim*.15));
        ctx.beginPath();ctx.moveTo(hx,hy);ctx.arc(hx,hy,R,ma2,-ma2,false);ctx.closePath();ctx.fillStyle=u.color;ctx.fill();
        if(u.id==='me'){ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();}
        ctx.fillStyle='rgba(30,15,5,.85)';ctx.beginPath();ctx.arc(hx+3,hy-R*.4,2,0,Math.PI*2);ctx.fill();
        drawHat(hx,hy,u.hat,R);
        if(u.eatingAnim>20){
          const cp2=(50-u.eatingAnim)/30;
          drawCake(hx+26-(26*cp2),neckY+6-(neckY+6-hy)*cp2,(1-cp2*.6)*.8);
        }
        if(u.eatingAnim<20&&u.eatingAnim>5){
          for(let ci=0;ci<6;ci++){
            const ang=(ci/6)*Math.PI*2,dist=(20-u.eatingAnim)*2.5;
            ctx.beginPath();ctx.arc(hx+Math.cos(ang)*dist,hy+Math.sin(ang)*dist,3*(u.eatingAnim/20),0,Math.PI*2);
            ctx.fillStyle=['#f5c842','#e03030','#fff8f0','#f0c030'][ci%4];ctx.fill();
          }
        }
      } else if(u.drinkingAnim>0&&u.holdingDrink.drink!=='케이크'){
        const prog=Math.min(1,u.drinkingAnim/20);
        ctx.beginPath();ctx.arc(hx,hy,R+2,0,Math.PI*2);ctx.fillStyle=u.color;ctx.fill();
        ctx.beginPath();ctx.arc(hx,hy,R,0,Math.PI*2);ctx.fillStyle=u.color;ctx.fill();
        if(u.id==='me'){ctx.strokeStyle='white';ctx.lineWidth=2.5;ctx.stroke();}
        ctx.fillStyle='rgba(255,255,255,.95)';ctx.beginPath();ctx.arc(hx+5,hy-3,2.5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(30,15,5,.85)';ctx.beginPath();ctx.arc(hx+5,hy-3,1.1,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(220,100,100,.9)';ctx.beginPath();ctx.ellipse(hx+R-1,hy+3,5,3,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(80,20,20,.6)';ctx.beginPath();ctx.ellipse(hx+R,hy+4,3,2,0,0,Math.PI*2);ctx.fill();
        drawHat(hx,hy,u.hat,R);
        const cx3=hx+R+2,cy3=hy+1;
        ctx.save();ctx.translate(cx3,cy3);ctx.rotate(-.7*prog);drawCup(0,0,u.holdingDrink.drink,u.holdingDrink.temp,.75);ctx.restore();
        ctx.lineWidth=4.5;ctx.strokeStyle=u.color;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(hx+10,neckY+4);ctx.quadraticCurveTo(hx+R+4,neckY,cx3,cy3+6);ctx.stroke();
      } else {
        drawCup(hx+18,neckY+6,u.holdingDrink.drink,u.holdingDrink.temp,.7);
      }
    }
  }

  // nametag + bubble
  const tagY=hy-R-38;
  drawNametag(hx,tagY,u);
  storeBubblePos(u,hx,tagY-6);

  // afk badge
  if(u.afk){
    ctx.fillStyle='rgba(80,80,80,.75)';
    ctx.font='500 10px -apple-system,sans-serif';ctx.textAlign='center';
    const aw=ctx.measureText('💤 부재중').width+12;
    ctx.beginPath();ctx.roundRect(hx-aw/2,tagY-16,aw,14,3);ctx.fill();
    ctx.fillStyle='#aaa';ctx.fillText('💤 부재중',hx,tagY-6);
  }

  // update anim counters
  if(u.toastAnim>0) u.toastAnim=Math.max(0,u.toastAnim-1);
  if(u.drinkingAnim>0) u.drinkingAnim=Math.max(0,u.drinkingAnim-1);
  if(u.eatingAnim>0) u.eatingAnim=Math.max(0,u.eatingAnim-1);
}

function drawNametag(hx,tagY,u){
  ctx.font='500 11px -apple-system,sans-serif';ctx.textAlign='center';
  const tw=ctx.measureText(u.name).width+14;
  ctx.fillStyle='rgba(10,10,20,.78)';
  ctx.beginPath();ctx.roundRect(hx-tw/2,tagY,tw,15,3);ctx.fill();
  ctx.fillStyle='white';ctx.fillText(u.name,hx,tagY+11);
}

// bubble positions stored per frame
const bubblePositions=[];
function storeBubblePos(u,hx,baseY){
  if(u.bubble) bubblePositions.push({u,hx,baseY});
}
function drawAllBubbles(){
  ctx.font='500 11px -apple-system,sans-serif';
  const PADDING=4;
  bubblePositions.sort((a,b)=>a.hx-b.hx);
  for(let i=0;i<bubblePositions.length;i++){
    for(let j=0;j<i;j++){
      const a=bubblePositions[j],b=bubblePositions[i];
      const bw=ctx.measureText(b.u.bubble.text).width+18;
      const aw=ctx.measureText(a.u.bubble.text).width+18;
      if(Math.abs(a.hx-b.hx)<(aw/2+bw/2+PADDING)&&Math.abs(a.baseY-b.baseY)<(20+PADDING)){
        b.baseY=Math.min(a.baseY,b.baseY)-(20+PADDING+6);
      }
    }
  }
  bubblePositions.forEach(({u,hx,baseY})=>{
    const txt=u.bubble.text;
    const bw=ctx.measureText(txt).width+18;
    ctx.fillStyle='rgba(255,255,255,.95)';ctx.strokeStyle='rgba(200,200,255,.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(hx-bw/2,baseY-20,bw,20,6);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.95)';
    ctx.beginPath();ctx.moveTo(hx-4,baseY);ctx.lineTo(hx,baseY+6);ctx.lineTo(hx+4,baseY);ctx.closePath();ctx.fill();
    ctx.fillStyle='#222';ctx.textAlign='center';ctx.fillText(txt,hx,baseY-4);
  });
}

}

function drawHome(){
  const g=ctx.createLinearGradient(0,0,0,canvas.height);g.addColorStop(0,'#1a2a1e');g.addColorStop(1,'#223028');ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);

  box(-4,-3,0,8,.1,2.8,'#303e28','#283618','#1e2810');
  tv(-3.8,-2.9,.3);bed(.3,-2.4);
  box(-3.8,.2,0,1.4,1,.38,'#3a4a5a','#2a3a4a','#1a2a3a');
  box(-3.8,.2,.38,1.4,.18,.58,'#4a5a6a','#3a4a5a','#2a3a4a');
  box(-2.0,.25,0,.6,.8,.28,'#6B4a28','#4B3018','#3B2010');
  // wardrobe
  box(WARDROBE.gx,WARDROBE.gy,0,1.0,.5,1.6,'#5a4030','#3a2818','#2a1808');

    ctx.lineWidth=4;ctx.strokeStyle=sc;ctx.beginPath();ctx.moveTo(hx,neckY);ctx.lineTo(hx,hy+R*.5);ctx.stroke();

    ctx.lineWidth=4;ctx.strokeStyle=sc;

    ctx.beginPath();ctx.moveTo(hx+5,neckY+3);ctx.quadraticCurveTo(hx+16,neckY+8,hx+12,waistY+1);ctx.stroke();
    ctx.lineWidth=4;ctx.strokeStyle=sc;ctx.beginPath();ctx.moveTo(hx,neckY);ctx.lineTo(hx,hy+R*.5);ctx.stroke();
    ctx.beginPath();ctx.arc(hx,hy,R,0,Math.PI*2);ctx.fillStyle=sc;ctx.fill();
    drawFace(hx,hy,'happy');
  }
  ctx.fillStyle='#2a1a10';ctx.beginPath();ctx.ellipse(hx,hy-R+2,R,4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.rect(hx-7,hy-R-12,14,14);ctx.fill();

// ── movement loop ──
let lastT=0;
function loop(t){
  const dt=t-lastT;lastT=t;
  handleKeys();
  [me,...others].forEach(u=>{
    const dx=u.tx-u.px,dy=u.ty-u.py,dist=Math.hypot(dx,dy);
    if(dist>2){
      const adx=Math.abs(dx),ady=Math.abs(dy);
      if(adx>ady) u.dir=dx>0?'right':'left'; else u.dir=dy>0?'down':'up';
      const spd=Math.min(dist,3);u.px+=dx/dist*spd;u.py+=dy/dist*spd;u.moving=true;
    } else {
      u.px=u.tx;u.py=u.ty;
      if(u.id!=='me'||!(keys['ArrowUp']||keys['ArrowDown']||keys['ArrowLeft']||keys['ArrowRight']||keys['w']||keys['s']||keys['a']||keys['d'])) u.moving=false;
    }
  });
  draw();
  requestAnimationFrame(loop);
}

// ── handleKeys ──
const SPEED=2.8;
function handleKeys(){
  if(!me.loggedIn||me.sitting||transitioning) return;
  const chatFocused=document.activeElement===document.getElementById('chatinput');
  const anyKey=!!(keys['ArrowUp']||keys['ArrowDown']||keys['ArrowLeft']||keys['ArrowRight']||keys['w']||keys['s']||keys['a']||keys['d']);
  if(anyKey) updateActivity();
  if(chatFocused){me.moving=false;return;}
  let dx=0,dy=0;
  if(keys['ArrowUp']||keys['w']) dy=-SPEED;
  if(keys['ArrowDown']||keys['s']) dy=SPEED;
  if(keys['ArrowLeft']||keys['a']) dx=-SPEED;
  if(keys['ArrowRight']||keys['d']) dx=SPEED;
  if(dx===0&&dy===0){
    const tdx=me.tx-me.px,tdy=me.ty-me.py;
    if(Math.hypot(tdx,tdy)<2) me.moving=false;
    return;
  }
  const c=clampToRoom(me.px+dx,me.py+dy);
  me.px=c.x;me.py=c.y;me.tx=c.x;me.ty=c.y;me.moving=true;
  const adx=Math.abs(dx),ady=Math.abs(dy);
  if(adx>ady) me.dir=dx>0?'right':'left'; else me.dir=dy>0?'down':'up';
}

// menu cursor: 0-6 drinks, 7=HOT, 8=ICE, 9=order
function menuMove(dir){
  const c=menuCursor;
  if(dir==='right'){if(c<=5) return c%2===0?c+1:c; if(c===7) return 8; return c;}
  if(dir==='left'){ if(c<=5) return c%2===1?c-1:c; if(c===8) return 7; return c;}
  if(dir==='down'){ if(c<=5){const n=c+2;return n<=6?n:(c<=4?6:7);} if(c===6)return 7; if(c===7||c===8)return 9; return c;}
  if(dir==='up'){   if(c===9)return 7; if(c===7||c===8)return 6; if(c===6)return 4; if(c<=5){const n=c-2;return n>=0?n:c;} return c;}
  return c;
}
function updateMenuFocus(){
  document.querySelectorAll('.mdrink').forEach((el,i)=>{el.classList.toggle('mfocus',i===menuCursor);});
  document.querySelectorAll('.mtemp').forEach((el,i)=>{el.classList.toggle('mfocus',(i+7)===menuCursor);});
  document.getElementById('menuorder').classList.toggle('mfocus',menuCursor===9);
}
function menuSelect(c){
  if(c>=0&&c<=6){
    selDrink=DRINKS[c];mdrinkIdx=c;
    document.querySelectorAll('.mdrink').forEach((el,i)=>el.classList.toggle('msel',i===c));
    const isCake=selDrink==='케이크';
    document.getElementById('cakenote').style.display=isCake?'block':'none';
    document.querySelector('.menu-temp').style.opacity=isCake?.3:1;
    if(isCake){selTemp='NONE';}
    document.getElementById('menuorder').disabled=!(selDrink&&selTemp);
  } else if(c===7||c===8){
    if(selDrink==='케이크') return;
    selTemp=TEMPS[c-7];
    document.querySelectorAll('.mtemp').forEach((el,i)=>el.classList.toggle('msel',i===c-7));
    document.getElementById('menuorder').disabled=!(selDrink&&selTemp);
  } else if(c===9){
    if(selDrink&&selTemp){const d=selDrink,t=selTemp==='NONE'?'HOT':selTemp;closeMenu();startOrder(d,t);}
  }
}
document.querySelectorAll('.mdrink').forEach((el,i)=>el.addEventListener('click',()=>{menuCursor=i;menuSelect(i);updateMenuFocus();}));

// ── chat ──
const chatHistory=[];
function detectEmotion(t){
  if(['ㅋㅋ','웃겨','우킴','웃김'].some(k=>t.includes(k))) return 'lol';
  if(['짜증','열받','돌겠'].some(k=>t.includes(k))) return 'angry';
  if(['ㅠㅠ','슬픔','슬퍼','힘들어'].some(k=>t.includes(k))) return 'sad';
  return null;
}
function sendChat(){
  const inp=document.getElementById('chatinput');
  const txt=inp.value.trim();if(!txt) return;
  inp.value='';updateActivity();
  const emo=detectEmotion(txt);
  if(emo) me.face=emo; else if(!me.sitting) me.face=me.baseFace;
  if(me.bubble&&me.bubble._t) clearTimeout(me.bubble._t);
  const t2=setTimeout(()=>{me.bubble=null;me.face=me.sitting?'relax':me.baseFace;},5000);
  me.bubble={text:txt,_t:t2};
  chatHistory.push({name:me.name,text:txt,color:me.color});
  if(chatHistory.length>100) chatHistory.shift();
  renderChatLog();
}
function renderChatLog(){
  const log=document.getElementById('chat-log');log.innerHTML='';
  chatHistory.slice(-30).forEach(m=>{
    const d=document.createElement('div');d.className='chat-msg';
    d.innerHTML=`<b style="color:${m.color}">${m.name}</b>${m.text}`;log.appendChild(d);
  });
  log.scrollTop=log.scrollHeight;
}
document.getElementById('chatsend').addEventListener('click',sendChat);
document.getElementById('chatinput').addEventListener('keydown',e=>{if(e.key==='Enter') sendChat();});

canvas.addEventListener('click',function(e){
  if(!me.loggedIn) return;
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  if(Math.hypot(mx-me.px,my-me.py)<20){openFacePicker(e.clientX,e.clientY);return;}
  document.getElementById('facepick').style.display='none';
  if(transitioning||me.sitting) return;
  const c=clampToRoom(mx,my);me.tx=c.x;me.ty=c.y;me.moving=true;updateActivity();
});
function openFacePicker(cx,cy){
  const fp=document.getElementById('facepick');fp.style.display='flex';
  const wr=cw.getBoundingClientRect();
  fp.style.left=(cx-wr.left-60)+'px';fp.style.top=(cy-wr.top-60)+'px';
}
document.querySelectorAll('#facepick button').forEach(btn=>{
  btn.addEventListener('click',function(e){e.stopPropagation();me.face=this.dataset.face;me.baseFace=this.dataset.face;this.parentElement.style.display='none';});
});
document.addEventListener('click',e=>{
  const fp=document.getElementById('facepick');
  if(!fp.contains(e.target)&&e.target!==canvas) fp.style.display='none';
});

// ── keyboard ──
document.addEventListener('keydown',function(e){
  if(!me.loggedIn) return;
  const chatFocused=document.activeElement===document.getElementById('chatinput');
  if(e.key==='Tab'&&chatFocused){e.preventDefault();document.getElementById('chatinput').blur();return;}

  // overlays take priority
  if(hatOpen){
    const total=HATS.length;
    if(e.key==='ArrowRight'){hatCursor=Math.min(hatCursor+1,total-1);}
    else if(e.key==='ArrowLeft'){hatCursor=Math.max(hatCursor-1,0);}
    else if(e.key==='ArrowDown'){hatCursor=Math.min(hatCursor+4,total-1);}
    else if(e.key==='ArrowUp'){hatCursor=Math.max(hatCursor-4,0);}
    else if(e.key==='Enter'){selectHat(hatCursor);}
    else if(e.key==='Escape'){closeHat();}
    else return;
    updateHatFocus();e.preventDefault();e.stopImmediatePropagation();return;
  }
  if(menuOpen){
    if(e.key==='ArrowRight'){menuCursor=menuMove('right');}
    else if(e.key==='ArrowLeft'){menuCursor=menuMove('left');}
    else if(e.key==='ArrowDown'){menuCursor=menuMove('down');}
    else if(e.key==='ArrowUp'){menuCursor=menuMove('up');}
    else if(e.key==='Enter'){menuSelect(menuCursor);}
    else if(e.key==='Escape'){closeMenu();}
    else return;
    updateMenuFocus();e.preventDefault();e.stopImmediatePropagation();return;
  }
  if(sceneNavOpen){
    const items=getNavItems();
    if(e.key==='ArrowDown'){sceneNavIdx=(sceneNavIdx+1)%items.length;updateSceneNavFocus();}
    else if(e.key==='ArrowUp'){sceneNavIdx=(sceneNavIdx-1+items.length)%items.length;updateSceneNavFocus();}
    else if(e.key==='Enter'){sceneNavSelect();}
    else if(e.key==='Escape'){closeSceneNav();}
    e.preventDefault();e.stopImmediatePropagation();return;
  }

  // action button Enter
  if(e.key==='Enter'&&actbtn.style.display==='block'&&!chatFocused){
    e.preventDefault();e.stopImmediatePropagation();actbtn.click();return;
  }

  // Ctrl = cheers
  if(e.key==='Control'&&document.getElementById('cheersbtn').style.display==='block'){doCheers();return;}

  if(chatFocused) return;

  if(e.key==='Enter'){
    // compare distances: door vs chair vs wardrobe
    const dd=distToDoor();
    let chairDist=999;
    if(scene==='office'){const nc=nearestOfficeChair();if(nc) chairDist=nc.dist;}
    else if(scene==='cafe'){const nc=nearestCafeChair();if(nc) chairDist=nc.dist;}
    else if(scene==='home') chairDist=Math.min(distToSofa(),distToWardrobe());

    if(me.sitting){me.sitting=false;me.face=me.baseFace;me.moving=false;e.preventDefault();return;}

    const doorOK=dd<70,chairOK=chairDist<70;
    const goDoor=doorOK&&(!chairOK||dd<chairDist);
    const goChair=chairOK&&(!doorOK||chairDist<=dd);

    if(goDoor){openSceneNav();e.preventDefault();return;}
    if(goChair){
      if(scene==='office'){
        const nc=nearestOfficeChair();
        if(nc&&nc.dist<70){me.sitting=true;me.face='relax';me.moving=false;me.chairDir='up';const p=ip(nc.gx+.25,nc.gy+.25,0);me.px=p.sx;me.py=p.sy;me.tx=p.sx;me.ty=p.sy;}
      } else if(scene==='cafe'){
        const nc=nearestCafeChair();
        if(nc&&nc.dist<70){me.sitting=true;me.face='relax';me.moving=false;me.chairDir=nc.gy<0?'down':'up';const p=ip(nc.gx+.25,nc.gy+.25,0);me.px=p.sx;me.py=p.sy;me.tx=p.sx;me.ty=p.sy;}
      } else if(scene==='home'){
        const dw=distToWardrobe(),ds=distToSofa();
        if(dw<70&&dw<=ds){openHat();}
        else if(ds<70){me.sitting=true;me.face='relax';me.moving=false;me.chairDir='down';const p=ip(SOFA.gx+.4,SOFA.gy+.4,0);me.px=p.sx;me.py=p.sy;me.tx=p.sx;me.ty=p.sy;}
      }
      e.preventDefault();return;
    }
    e.preventDefault();
  }

  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',function(e){
  keys[e.key]=false;
  if(!keys['ArrowUp']&&!keys['ArrowDown']&&!keys['ArrowLeft']&&!keys['ArrowRight']&&!keys['w']&&!keys['s']&&!keys['a']&&!keys['d']) me.moving=false;
});

// ── cheers ──
const cheersbtn=document.getElementById('cheersbtn');
function checkCheers(){
  if(!me.loggedIn||!me.holdingDrink||scene==='home'){cheersbtn.style.display='none';return;}
  const near=others.filter(u=>u.scene===scene&&u.holdingDrink);
  let best=null,bd=9999;
  near.forEach(u=>{const d=Math.hypot(me.px-u.px,me.py-u.py);if(d<80&&d<bd){bd=d;best=u;}});
  if(best){
    cheersbtn.style.display='block';
    const mx=(me.px+best.px)/2,my=(me.py+best.py)/2-50;
    cheersbtn.style.left=(mx-60)+'px';cheersbtn.style.top=my+'px';
    cheersbtn._target=best;
  } else {cheersbtn.style.display='none';cheersbtn._target=null;}
}
function doCheers(){
  if(!cheersbtn._target) return;
  me.toastAnim=80;cheersbtn._target.toastAnim=80;cheersbtn.style.display='none';
}
cheersbtn.addEventListener('click',doCheers);

// ── sidebar ──
function updateSidebar(){
  const list=document.getElementById('user-list');list.innerHTML='';
  [me,...others].forEach(u=>{
    const loc={office:'🏢 사무실',cafe:'☕ 카페',home:'집'}[u.scene]||'';
    const isHome=u.scene==='home'&&u.id!=='me';
    const div=document.createElement('div');div.className='user-item';
    div.innerHTML=`<div class="u-dot" style="background:${u.color}33;color:${u.color}">${u.name[0]}</div>
      <div class="u-info">
        <div class="u-name" data-uid="${u.id}">${u.name}${u.id==='me'?' (나)':''}</div>
        ${isHome?`<div class="home-badge">🏠 개인공간 중</div>`:`<div class="u-loc">${loc}</div>`}
      </div><div class="u-dot2"></div>`;
    list.appendChild(div);
  });
  const myName=list.querySelector('[data-uid="me"]');
  if(myName) myName.addEventListener('click',e=>{e.stopPropagation();openColorPopup();});
}

// ── login ──
const loginInput=document.getElementById('logininput');
const loginBtn=document.getElementById('loginbtn');
loginInput.addEventListener('input',function(){loginBtn.disabled=this.value.trim().length===0;});
loginInput.addEventListener('keydown',function(e){if(e.key==='Enter'&&this.value.trim()) loginBtn.click();});
loginBtn.addEventListener('click',function(){
  const name=loginInput.value.trim();if(!name) return;
  me.name=name;me.color=COLORS[name.charCodeAt(0)%COLORS.length];
  me.baseFace='happy';me.face='happy';me.sitting=false;me.hat=null;
  me.drinkingAnim=0;me.toastAnim=0;me.eatingAnim=0;
  me.afk=false;me.lastActive=Date.now();me.loggedIn=true;
  me.scene='office';
  initMe();
  me.sitting=false; // absolute guarantee
  document.getElementById('loginscreen').style.display='none';
  document.getElementById('statusbar').textContent=SCENES['office'].label;
  updateSidebar();
  // double-check after a frame
  setTimeout(()=>{me.sitting=false;me.moving=false;},50);
});

// ── init ──
resize();
// initMe called on login, not here - just draw empty scene
draw();
updateSidebar();
requestAnimationFrame(loop);
// periodic cheers check
setInterval(checkCheers,500);
</script>
</body>
</html>
